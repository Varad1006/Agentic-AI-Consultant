version: "3.8"

services:

  # 1. Redis
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  # 2. FastAPI
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./chroma_db:/app/chroma_db
      - ./app/storage:/app/app/storage

  # 3. Celery Worker
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_BACKEND_URL: redis://redis:6379/1
    depends_on:
      - redis
    command: celery -A app.celery_worker.celery_app worker --loglevel=info --pool=solo
    volumes:
      - ./chroma_db:/app/chroma_db
      - ./app/storage:/app/app/storage

  # 4. React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3001:5173"
    depends_on:
      - api